<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=300">
  <title>Leitor Neural</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 300px;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0a0e1a;
      color: #e2e8f0;
      overflow: hidden;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 16px 12px;
      border-bottom: 1px solid rgba(139, 92, 246, 0.15);
    }

    .header-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, #8b5cf6, #06b6d4);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .header-icon svg {
      width: 18px;
      height: 18px;
      color: white;
    }

    .header-text h1 {
      font-size: 14px;
      font-weight: 700;
      background: linear-gradient(to right, #c4b5fd, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1.2;
    }

    .header-text span {
      font-size: 10px;
      color: #64748b;
    }

    .actions {
      padding: 12px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border: 1px solid rgba(139, 92, 246, 0.12);
      border-radius: 12px;
      background: rgba(139, 92, 246, 0.06);
      color: #e2e8f0;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 13px;
      font-family: inherit;
      text-align: left;
      width: 100%;
    }

    .btn:hover {
      background: rgba(139, 92, 246, 0.15);
      border-color: rgba(139, 92, 246, 0.3);
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .btn-icon svg {
      width: 18px;
      height: 18px;
    }

    .btn-icon.url {
      background: rgba(139, 92, 246, 0.15);
      color: #a78bfa;
    }

    .btn-icon.text {
      background: rgba(168, 85, 247, 0.15);
      color: #c084fc;
    }

    .btn-icon.pdf {
      background: rgba(6, 182, 212, 0.15);
      color: #22d3ee;
    }

    .btn-info {
      flex: 1;
    }

    .btn-info strong {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .btn-info span {
      font-size: 11px;
      color: #64748b;
    }

    .btn-arrow {
      color: #475569;
      flex-shrink: 0;
    }

    .btn-arrow svg {
      width: 14px;
      height: 14px;
    }

    .status {
      padding: 0 16px 12px;
      font-size: 11px;
      color: #22d3ee;
      text-align: center;
      display: none;
    }

    .status.visible {
      display: block;
    }
  </style>
</head>

<body>
  <!-- Header -->
  <div class="header">
    <div class="header-icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
      </svg>
    </div>
    <div class="header-text">
      <h1>Leitor Neural</h1>
      <span>Produtividade Pessoal</span>
    </div>
  </div>

  <!-- Actions -->
  <div class="actions">
    <!-- Read Current Tab -->
    <button class="btn" id="btn-read-tab">
      <div class="btn-icon url">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"
          stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9" />
        </svg>
      </div>
      <div class="btn-info">
        <strong>Ler Aba Atual</strong>
        <span>Captura e lê a página aberta</span>
      </div>
      <div class="btn-arrow">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
        </svg>
      </div>
    </button>

    <!-- Paste Text -->
    <button class="btn" id="btn-paste">
      <div class="btn-icon text">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"
          stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
        </svg>
      </div>
      <div class="btn-info">
        <strong>Colar Texto</strong>
        <span>Cole ou digite texto para ler</span>
      </div>
      <div class="btn-arrow">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
        </svg>
      </div>
    </button>

    <!-- Read PDF -->
    <button class="btn" id="btn-pdf">
      <div class="btn-icon pdf">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"
          stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
        </svg>
      </div>
      <div class="btn-info">
        <strong>Ler PDF</strong>
        <span>Upload de arquivo PDF</span>
      </div>
      <div class="btn-arrow">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
        </svg>
      </div>
    </button>
  </div>

  <!-- Status -->
  <div class="status" id="status"></div>

  <script src="popup.js"></script>
</body>

</html>
