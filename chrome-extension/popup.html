<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leitor Neural</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            neural: {
              50: '#eef2ff',
              100: '#e0e7ff',
              200: '#c7d2fe',
              400: '#818cf8',
              500: '#6366f1',
              600: '#4f46e5',
              700: '#4338ca',
              800: '#3730a3',
              900: '#1e1b4b',
              950: '#0f0d2e',
            }
          }
        }
      }
    }
  </script>
  <style>
    body {
      width: 340px;
      min-height: 420px;
      margin: 0;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    .btn-glow:hover {
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
    }
    .pulse-dot {
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .gradient-border {
      background: linear-gradient(135deg, #6366f1, #8b5cf6, #06b6d4);
      padding: 1px;
      border-radius: 12px;
    }
    .gradient-border-inner {
      background: #0f0d2e;
      border-radius: 11px;
    }
  </style>
</head>
<body class="bg-neural-950 text-white">
  
  <!-- Header -->
  <div class="px-5 pt-5 pb-3">
    <div class="flex items-center gap-3 mb-1">
      <div class="relative">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-cyan-400 flex items-center justify-center">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
          </svg>
        </div>
        <div class="absolute -top-0.5 -right-0.5 w-3 h-3 bg-green-400 rounded-full border-2 border-neural-950 pulse-dot"></div>
      </div>
      <div>
        <h1 class="text-lg font-bold bg-gradient-to-r from-indigo-300 to-cyan-300 bg-clip-text text-transparent">
          Leitor Neural
        </h1>
        <p class="text-xs text-gray-500">Produtividade Pessoal</p>
      </div>
    </div>
  </div>

  <!-- Divider -->
  <div class="px-5">
    <div class="h-px bg-gradient-to-r from-transparent via-indigo-500/30 to-transparent"></div>
  </div>

  <!-- Action Buttons -->
  <div class="px-5 py-4 space-y-3">
    
    <!-- Ler Aba Atual -->
    <button id="btn-read-tab" class="btn-glow w-full gradient-border transition-all duration-300 hover:scale-[1.02] active:scale-[0.98]">
      <div class="gradient-border-inner px-4 py-3.5 flex items-center gap-3">
        <div class="w-9 h-9 rounded-lg bg-indigo-500/20 flex items-center justify-center flex-shrink-0">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9" />
          </svg>
        </div>
        <div class="text-left">
          <span class="block text-sm font-semibold text-white">Ler Aba Atual</span>
          <span class="block text-xs text-gray-400">Captura e lê a página aberta</span>
        </div>
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-gray-500 ml-auto" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
        </svg>
      </div>
    </button>

    <!-- Colar Texto -->
    <button id="btn-paste-text" class="btn-glow w-full gradient-border transition-all duration-300 hover:scale-[1.02] active:scale-[0.98]">
      <div class="gradient-border-inner px-4 py-3.5 flex items-center gap-3">
        <div class="w-9 h-9 rounded-lg bg-purple-500/20 flex items-center justify-center flex-shrink-0">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-purple-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
          </svg>
        </div>
        <div class="text-left">
          <span class="block text-sm font-semibold text-white">Colar Texto</span>
          <span class="block text-xs text-gray-400">Cole ou digite um texto para ler</span>
        </div>
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-gray-500 ml-auto" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
        </svg>
      </div>
    </button>

    <!-- Ler PDF -->
    <button id="btn-read-pdf" class="btn-glow w-full gradient-border transition-all duration-300 hover:scale-[1.02] active:scale-[0.98]">
      <div class="gradient-border-inner px-4 py-3.5 flex items-center gap-3">
        <div class="w-9 h-9 rounded-lg bg-cyan-500/20 flex items-center justify-center flex-shrink-0">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-cyan-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
          </svg>
        </div>
        <div class="text-left">
          <span class="block text-sm font-semibold text-white">Ler PDF</span>
          <span class="block text-xs text-gray-400">Faça upload de um arquivo PDF</span>
        </div>
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-gray-500 ml-auto" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
        </svg>
      </div>
    </button>

  </div>

  <!-- Status Bar -->
  <div class="px-5 pb-2">
    <div class="h-px bg-gradient-to-r from-transparent via-indigo-500/30 to-transparent mb-3"></div>
    <div id="status" class="text-center text-xs text-gray-500 py-1">
      Pronto para capturar
    </div>
  </div>

  <!-- Footer -->
  <div class="px-5 pb-4">
    <div class="flex items-center justify-center gap-1.5 text-[10px] text-gray-600">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
      </svg>
      <span>Abre no Microsoft Edge • Vozes Neurais</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
